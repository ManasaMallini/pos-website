<!DOCTYPE html>
<html>
<head>
<title>Procurement</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.navbar{background:#6a0572;color:white;padding:15px;display:flex;justify-content:space-between;}
.navbar a{color:white;text-decoration:none;margin-left:15px;font-weight:bold;}
.container{padding:20px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab{padding:10px 15px;background:#ddd;border-radius:8px;cursor:pointer;}
.active{background:#6a0572;color:white;}
input{padding:10px;margin:5px;width:250px;border-radius:5px;border:1px solid #ccc;}
.btn{background:#6a0572;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
th{background:#6a0572;color:white;}
</style>
</head>
<body>

<div class="navbar">
<h2>Procurement</h2>
<div>
<a href="/">Sales</a>
<a href="/inventory">Inventory</a>
</div>
</div>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="showTab('products')">Products</div>
<div class="tab" onclick="showTab('suppliers')">Suppliers</div>
<div class="tab" onclick="showTab('orders')">Orders</div>
</div>

<!-- PRODUCTS -->
<div id="products">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pstock" placeholder="Stock">
<input id="psupplier" placeholder="Supplier">
<button class="btn" onclick="addProduct()">Add</button>

<table>
<thead><tr><th>Name</th><th>Price</th><th>Stock</th><th>Supplier</th></tr></thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- SUPPLIERS -->
<div id="suppliers" style="display:none;">
<h3>Add Supplier</h3>
<input id="sname" placeholder="Supplier Name">
<input id="slocation" placeholder="Location">
<input id="scontact" placeholder="Contact">
<button class="btn" onclick="addSupplier()">Add</button>

<table>
<thead><tr><th>Name</th><th>Location</th><th>Contact</th></tr></thead>
<tbody id="supplierTable"></tbody>
</table>
</div>

<!-- ORDERS -->
<div id="orders" style="display:none;">
<h3>Orders Tracking</h3>
<table>
<thead><tr><th>ID</th><th>Total</th><th>Payment</th><th>Date</th></tr></thead>
<tbody id="orderTable"></tbody>
</table>
</div>

</div>

<script>

// TAB SWITCH
function showTab(tab){
    document.getElementById("products").style.display="none";
    document.getElementById("suppliers").style.display="none";
    document.getElementById("orders").style.display="none";

    document.getElementById(tab).style.display="block";

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");

    if(tab==="suppliers") loadSuppliers();
    if(tab==="orders") loadOrders();
}

// PRODUCTS
async function loadProducts(){
    const res = await fetch("/api/products/all");
    const data = await res.json();

    let html="";
    data.forEach(p=>{
        html+=`<tr>
        <td>${p.name}</td>
        <td>₹${p.price}</td>
        <td>${p.stock}</td>
        <td>${p.supplier||""}</td>
        </tr>`;
    });
    document.getElementById("productTable").innerHTML=html;
}

async function addProduct(){
    const res = await fetch("/api/products",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:pname.value,
            price:pprice.value,
            stock:pstock.value,
            supplier:psupplier.value
        })
    });

    if(res.ok){
        alert("Product Added");
        loadProducts();
    }else{
        alert("Error adding product");
    }
}

// SUPPLIERS
async function loadSuppliers(){
    const res = await fetch("/api/suppliers");
    const data = await res.json();

    let html="";
    data.forEach(s=>{
        html+=`<tr>
        <td>${s.name}</td>
        <td>${s.location}</td>
        <td>${s.contact}</td>
        </tr>`;
    });
    document.getElementById("supplierTable").innerHTML=html;
}

async function addSupplier(){
    await fetch("/api/suppliers",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:sname.value,
            location:slocation.value,
            contact:scontact.value
        })
    });

    alert("Supplier Added");
    loadSuppliers();
}

// ORDERS
async function loadOrders(){
    const res = await fetch("/api/orders/all");
    const data = await res.json();

    let html="";
    data.forEach(o=>{
        html+=`<tr>
        <td>${o.id}</td>
        <td>₹${o.total}</td>
        <td>${o.payment_method}</td>
        <td>${o.created_at}</td>
        </tr>`;
    });
    document.getElementById("orderTable").innerHTML=html;
}

// INIT
loadProducts();

</script>
</body>
</html>
