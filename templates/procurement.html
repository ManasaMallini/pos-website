<!DOCTYPE html>
<html>
<head>
    <title>Procurement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .navbar {
            background: linear-gradient(to right, #1f8a70, #2bbbad);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab {
            padding: 10px 15px;
            background: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
        }

        .active {
            background: #1f8a70;
            color: white;
        }

        input {
            padding: 10px;
            width: 300px;
            margin-bottom: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .btn {
            background: #1f8a70;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .green { background: #d4edda; }
        .red { background: #f8d7da; }
        .yellow { background: #fff3cd; }
    </style>
</head>

<body>

<div class="navbar">
    <h2>QuickPOS</h2>
    <div>
        <a href="/">Sales & Billing</a>
        <a href="/inventory">Inventory</a>
        <a href="/procurement">Procurement</a>
    </div>
</div>

<div class="container">

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="showTab('products')">Products</div>
        <div class="tab" onclick="showTab('suppliers')">Suppliers</div>
        <div class="tab" onclick="showTab('orders')">Orders & Tracking</div>
    </div>

    <!-- SEARCH -->
    <input type="text" placeholder="Search products..." id="search" onkeyup="loadProducts()">

    <!-- PRODUCTS -->
    <div id="products" class="card">
        <h3>Product Catalog 
            <button class="btn" onclick="addProduct()">+ Add Product</button>
        </h3>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Supplier</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

    <!-- SUPPLIERS -->
    <div id="suppliers" class="card" style="display:none;">
        <h3>Suppliers</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Contact</th>
                </tr>
            </thead>
            <tbody id="suppliersTable"></tbody>
        </table>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="card" style="display:none;">
        <h3>Orders & Tracking</h3>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ordersTable"></tbody>
        </table>
    </div>

</div>

<script>

// ✅ SAMPLE DATA
let products = [
    {name:"Organic Coffee Beans 1kg", price:24.99, stock:145, supplier:"FreshFarm Distributors"},
    {name:"Wireless Bluetooth Speaker", price:79.99, stock:38, supplier:"TechVault Supply Co."},
    {name:"Premium Olive Oil 500ml", price:18.49, stock:0, supplier:"FreshFarm Distributors"},
    {name:"USB-C Hub Adapter", price:34.99, stock:72, supplier:"TechVault Supply Co."},
    {name:"Artisan Chocolate Box", price:32.99, stock:8, supplier:"Global Goods Inc."},
    {name:"Eco-Friendly Tote Bag", price:12.99, stock:230, supplier:"Premium Packaging Ltd."},
    {name:"Stainless Steel Tumbler", price:27.99, stock:56, supplier:"Global Goods Inc."},
    {name:"Herbal Tea Collection", price:15.99, stock:3, supplier:"FreshFarm Distributors"}
];

let suppliers = [
    {name:"FreshFarm Distributors", location:"India", contact:"+91 9876543210"},
    {name:"TechVault Supply Co.", location:"USA", contact:"+1 234567890"},
    {name:"Global Goods Inc.", location:"UK", contact:"+44 987654321"},
    {name:"Premium Packaging Ltd.", location:"Germany", contact:"+49 123456789"}
];

let orders = [
    {id:"ORD001", product:"Coffee Beans", status:"Delivered"},
    {id:"ORD002", product:"Speaker", status:"Shipped"},
    {id:"ORD003", product:"Olive Oil", status:"Pending"},
    {id:"ORD004", product:"Tote Bag", status:"Delivered"}
];

// 🔄 TAB SWITCH
function showTab(tab){
    document.getElementById("products").style.display = "none";
    document.getElementById("suppliers").style.display = "none";
    document.getElementById("orders").style.display = "none";

    document.getElementById(tab).style.display = "block";

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");

    if(tab === "suppliers") loadSuppliers();
    if(tab === "orders") loadOrders();
}

// 📦 LOAD PRODUCTS
function loadProducts(){
    let search = document.getElementById("search").value.toLowerCase();
    let html = "";

    products.forEach(p => {

        if(search && !p.name.toLowerCase().includes(search)) return;

        let cls = "green";
        if(p.stock == 0) cls = "red";
        else if(p.stock < 10) cls = "yellow";

        html += `
        <tr>
            <td>${p.name}</td>
            <td>₹${p.price}</td>
            <td><span class="badge ${cls}">${p.stock}</span></td>
            <td>${p.supplier}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;
}

// 🏢 LOAD SUPPLIERS
function loadSuppliers(){
    let html = "";

    suppliers.forEach(s => {
        html += `
        <tr>
            <td>${s.name}</td>
            <td>${s.location}</td>
            <td>${s.contact}</td>
        </tr>`;
    });

    document.getElementById("suppliersTable").innerHTML = html;
}

// 🚚 LOAD ORDERS
function loadOrders(){
    let html = "";

    orders.forEach(o => {
        html += `
        <tr>
            <td>${o.id}</td>
            <td>${o.product}</td>
            <td>${o.status}</td>
        </tr>`;
    });

    document.getElementById("ordersTable").innerHTML = html;
}

// ➕ ADD PRODUCT
function addProduct(){
    let name = prompt("Enter product name");
    let price = prompt("Enter price");
    let stock = prompt("Enter stock");

    products.push({
        name:name,
        price:parseFloat(price),
        stock:parseInt(stock),
        supplier:"Manual Entry"
    });

    loadProducts();
}

// INIT
loadProducts();

</script>

</body>
</html>
