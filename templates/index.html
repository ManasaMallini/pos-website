<!DOCTYPE html>
<html lang="en">
<head>

<!-- 🔹 LEVEL 1: ON-PAGE SEO -->
<meta charset="UTF-8">
<meta name="description" content="QuickPOS system for billing, inventory and procurement management">
<meta name="keywords" content="POS, billing system, inventory, procurement, sales software">
<meta name="author" content="Manasa">

<!-- 🔹 LEVEL 2: TECHNICAL SEO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<!-- 🔹 LEVEL 5: ADVANCED SEO -->
<meta property="og:title" content="QuickPOS System">
<meta property="og:description" content="Smart POS system for billing and inventory management">
<meta property="og:type" content="website">

<title>QuickPOS - Sales & Billing System</title>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#1f8a70,#6fb1fc);}
.navbar{background:#0f3d3e;color:white;padding:15px;display:flex;justify-content:space-between;}
.navbar a{color:white;text-decoration:none;margin-left:15px;font-weight:bold;}
.container{padding:20px;}
#products{display:flex;flex-wrap:wrap;gap:20px;}

.product{
background:linear-gradient(145deg,#fdfbfb,#ebedee);
padding:25px;
width:200px;
text-align:center;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
cursor:pointer;
transition:transform 0.2s;
font-weight:bold;
font-size:20px;
}

.product:hover{
transform:scale(1.1);
background:linear-gradient(145deg,#ffeaa7,#fab1a0);
}

table{width:100%;border-collapse:collapse;margin-top:30px;background:white;border-radius:10px;overflow:hidden;}
th,td{padding:12px;border-bottom:1px solid #ddd;}
th{background:#1f8a70;color:white;}

.btn{
background:#1f8a70;
color:white;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.btn:hover{background:#6fb1fc;}
</style>

</head>

<body>

<!-- 🔹 LEVEL 3: NAVIGATION SEO -->
<div class="navbar">
<h1>QuickPOS</h1>
<div>
<a href="/inventory">Inventory</a> 
<a href="/procurement">Procurement</a>
</div>
</div>

<div class="container">

<!-- 🔹 LEVEL 3: STRUCTURED HEADINGS -->
<h2>Sales & Billing</h2>

<h3>Products</h3>
<div id="products"></div>

<h3>Bill</h3>
<table>
<thead><tr><th>Name</th><th>Qty</th><th>Price</th></tr></thead>
<tbody id="billTable"></tbody>
</table>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="btn" onclick="checkout()">Generate & Print Bill</button>

</div>

<script>
let cart = [];

async function loadProducts() {
    const res = await fetch("/api/products/all");
    const data = await res.json();

    let html = "";
    data.forEach(p=>{
        html += `
        <div class="product" onclick="addToCart(${p.id},'${p.name}',${p.price})">
            ${p.name}<br>₹${p.price}
        </div>`;
    });

    document.getElementById("products").innerHTML = html;
}

function addToCart(id,name,price){
    let item = cart.find(c=>c.id===id);

    if(item){
        item.qty++;
    }else{
        cart.push({id,name,price,qty:1});
    }

    updateBill();
}

function updateBill(){
    let html = "";
    let total = 0;

    cart.forEach(c=>{
        let rowTotal = c.price * c.qty;
        total += rowTotal;

        html += `
        <tr>
            <td>${c.name}</td>
            <td>${c.qty}</td>
            <td>₹${rowTotal}</td>
        </tr>`;
    });

    document.getElementById("billTable").innerHTML = html;
    document.getElementById("total").innerText = total;
}

async function checkout(){

    if(cart.length === 0){
        alert("Cart empty!");
        return;
    }

    let total = cart.reduce((sum,c)=>sum + c.price*c.qty,0);

    await fetch("/api/orders",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            total: total,
            payment_method: "Cash",
            items: cart
        })
    });

    let billHTML = `
    <h2 style="text-align:center;">🧾 QuickPOS Bill</h2>
    <table border="1" width="100%" cellpadding="10">
        <tr><th>Name</th><th>Qty</th><th>Price</th></tr>
    `;

    cart.forEach(c=>{
        billHTML += `
        <tr>
            <td>${c.name}</td>
            <td>${c.qty}</td>
            <td>₹${c.price*c.qty}</td>
        </tr>`;
    });

    billHTML += `
    </table>
    <h3 style="text-align:right;">Total: ₹${total}</h3>
    `;

    let win = window.open("", "", "width=600,height=600");
    win.document.write(billHTML);
    win.document.close();
    win.print();

    cart = [];
    updateBill();
}

loadProducts();
</script>

</body>
</html>
