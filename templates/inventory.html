<!DOCTYPE html>
<html>
<head>
<title>Inventory</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#89f7fe,#66a6ff);}
.navbar{background:#05445e;color:white;padding:15px;display:flex;justify-content:space-between;}
.navbar a{color:white;text-decoration:none;margin-left:15px;font-weight:bold;}
.container{padding:20px;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;border-radius:10px;overflow:hidden;}
th,td{padding:12px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#05445e;color:white;}
.chart-container{margin-top:30px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="navbar">
<h2>Inventory</h2>
<div>
<a href="/">Sales</a>
<a href="/procurement">Procurement</a>
</div>
</div>

<div class="container">
<h3>Current Stock</h3>
<table>
<thead><tr><th>Name</th><th>Stock</th><th>Price</th></tr></thead>
<tbody id="invTable"></tbody>
</table>

<h3>Profit/Loss Chart</h3>
<div class="chart-container">
<canvas id="profitChart" height="150"></canvas>
</div>
</div>

<script>
async function loadInventory(){
    const res = await fetch("/api/products/all");
    const data = await res.json();
    let html=""; let labels=[], profits=[];
    data.forEach(p=>{
        html+=`<tr><td>${p.name}</td><td>${p.stock}</td><td>₹${p.price}</td></tr>`;
        labels.push(p.name);
        profits.push(p.price*p.stock); // simple stock*price as potential profit
    });
    document.getElementById("invTable").innerHTML = html;

    new Chart(document.getElementById("profitChart"),{
        type:'bar',
        data:{labels:labels,datasets:[{label:'Potential Profit',data:profits,backgroundColor:'rgba(75,192,192,0.6)'}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
    });
}

loadInventory();
</script>
</body>
</html>
