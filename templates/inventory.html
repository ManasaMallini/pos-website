<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .navbar {
            background: #1f8a70;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>QuickPOS</h2>
    <div>
        <a href="/">Sales</a>
        <a href="/inventory">Inventory</a>
        <a href="/procurement">Procurement</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h3>Inventory Graph</h3>
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <h3>Products</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<script>

// 🔥 FALLBACK DATA (if API fails)
let fallback = [
    {name:"Coffee", stock:50},
    {name:"Speaker", stock:20},
    {name:"Olive Oil", stock:0},
    {name:"USB Hub", stock:15}
];

// LOAD FUNCTION
function loadData(data){

    let names = [];
    let stocks = [];
    let html = "";

    data.forEach(p=>{
        names.push(p.name);
        stocks.push(p.stock);

        html += `
        <tr>
            <td>${p.name}</td>
            <td>${p.stock}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;

    new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: "Stock",
                data: stocks
            }]
        }
    });
}

// TRY API FIRST
fetch('/api/products/all')
.then(res => res.json())
.then(data => {
    if(data && data.length > 0){
        loadData(data);
    } else {
        loadData(fallback);
    }
})
.catch(()=>{
    // API fail → fallback use
    loadData(fallback);
});

</script>

</body>
</html>
