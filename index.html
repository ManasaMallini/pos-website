<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS System</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">
<h2>POS</h2>
<button onclick="showSection('procurement')">Procurement</button>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('sales')">Sales</button>
<button onclick="showSection('history')">History</button>
</div>

<div class="main">

<div id="procurement" class="section active">
<h2>Suppliers</h2>
<input id="supplierInput">
<button onclick="addSupplier()">Add</button>
<div id="supplierList"></div>
</div>

<div id="inventory" class="section">
<h2>Products</h2>
<h3 id="productCount"></h3>
<input id="productName">
<input id="productPrice">
<button onclick="addProduct()">Add</button>
<div id="productList"></div>
</div>

<div id="sales" class="section">
<h2>Billing</h2>

<input id="customerName" placeholder="Customer Name">
<input id="discount" placeholder="Discount %">

<select id="productSelect"></select>
<input id="quantity">
<button onclick="addToCart()">Add to Cart</button>

<div id="cartList"></div>
<div class="bill" id="billBox"></div>

<button onclick="printBill()">🧾 Print</button>
<button onclick="checkout()">Checkout</button>
</div>

<div id="history" class="section">
<h2>History</h2>
<div id="historyList"></div>
</div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
