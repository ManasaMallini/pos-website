<!DOCTYPE html>
<html>
<head>
    <title>QuickPOS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>🛒 QuickPOS</h2>

<div class="container">

    <!-- PRODUCTS -->
    <div class="left">
        <h3>Products</h3>
        <div id="products"></div>
    </div>

    <!-- BILL -->
    <div class="right" id="bill">
        <h3>Bill</h3>
        <div id="receipt"></div>

        <p>Subtotal: $<span id="subtotal">0</span></p>
        <p>Tax: $<span id="tax">0</span></p>
        <h2>Total: $<span id="total">0</span></h2>

        <button onclick="completeSale()">Complete Sale</button>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
