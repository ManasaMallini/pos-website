<!DOCTYPE html>
<html>
<head>
    <title>QuickPOS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f8;
        }

        .navbar {
            background: linear-gradient(to right, #1f8a70, #2bbbad);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        /* PRODUCTS GRID */
        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .product:hover {
            background: #e6f7f3;
        }

        /* BILL (BOTTOM) */
        .bill {
            margin-top: 30px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .bill table {
            width: 100%;
            border-collapse: collapse;
        }

        .bill th, .bill td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .total {
            text-align: right;
            font-size: 18px;
            margin-top: 10px;
        }

        .btn {
            background: #1f8a70;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <h2>QuickPOS</h2>
    <div>
        <a href="/">Sales & Billing</a>
        <a href="/inventory">Inventory</a>
        <a href="/procurement">Procurement</a>
    </div>
</div>

<div class="container">

    <h2>Products</h2>

    <!-- PRODUCTS -->
    <div class="products" id="products"></div>

    <!-- BILL (BOTTOM) -->
    <div class="bill">
        <h3>Current Bill</h3>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="billTable"></tbody>
        </table>

        <div class="total">
            Total: ₹<span id="total">0</span>
        </div>

        <button class="btn" onclick="checkout()">Generate Bill</button>
    </div>

</div>

<script>

// SAMPLE PRODUCTS (you can replace with API later)
let products = [
    {name:"Coffee", price:100},
    {name:"Tea", price:50},
    {name:"Burger", price:120},
    {name:"Pizza", price:200},
    {name:"Sandwich", price:80},
    {name:"Juice", price:60}
];

let bill = [];

// LOAD PRODUCTS
function loadProducts(){
    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="product" onclick="addToBill(${i})">
            <h4>${p.name}</h4>
            <p>₹${p.price}</p>
        </div>`;
    });

    document.getElementById("products").innerHTML = html;
}

// ADD TO BILL
function addToBill(i){
    let item = products[i];

    let found = bill.find(b=>b.name===item.name);

    if(found){
        found.qty += 1;
    } else {
        bill.push({...item, qty:1});
    }

    updateBill();
}

// UPDATE BILL
function updateBill(){
    let html = "";
    let total = 0;

    bill.forEach(b=>{
        total += b.price * b.qty;

        html += `
        <tr>
            <td>${b.name}</td>
            <td>${b.qty}</td>
            <td>₹${b.price * b.qty}</td>
        </tr>`;
    });

    document.getElementById("billTable").innerHTML = html;
    document.getElementById("total").innerText = total;
}

// CHECKOUT
function checkout(){
    alert("Bill Generated ₹" + document.getElementById("total").innerText);
    bill = [];
    updateBill();
}

// INIT
loadProducts();

</script>

</body>
</html>
