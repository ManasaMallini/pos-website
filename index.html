<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS System</title>

<style>
body { margin:0; font-family:Arial; display:flex; }

.sidebar {
    width:220px; height:100vh;
    background: linear-gradient(180deg,#1e3c72,#2a5298);
    color:white; padding:20px;
}

.sidebar button {
    width:100%; margin:10px 0; padding:12px;
    background:white; border:none; cursor:pointer;
}

.main { flex:1; padding:20px; background:#f4f6f9; }

.section { display:none; }
.active { display:block; }

input, select { padding:10px; margin:5px; }

.card {
    background:white; padding:10px; margin-top:10px;
    border-radius:6px;
    display:flex; justify-content:space-between;
}

.bill {
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

h2.total {
    color:green;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>POS</h2>
<button onclick="showSection('procurement')">Procurement</button>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="showSection('sales')">Sales</button>
</div>

<div class="main">

<!-- PROCUREMENT -->
<div id="procurement" class="section active">
<h2>Suppliers</h2>
<input id="supplierInput" placeholder="Supplier Name">
<button onclick="addSupplier()">Add</button>
<div id="supplierList"></div>
</div>

<!-- INVENTORY -->
<div id="inventory" class="section">
<h2>Products</h2>
<h3 id="productCount"></h3>
<input id="productName" placeholder="Product Name">
<input id="productPrice" placeholder="Price">
<button onclick="addProduct()">Add</button>
<div id="productList"></div>
</div>

<!-- SALES -->
<div id="sales" class="section">
<h2>Billing</h2>

<select id="productSelect"></select>
<input id="quantity" placeholder="Qty">
<button onclick="addToCart()">Add to Cart</button>

<div id="cartList"></div>

<div class="bill" id="billBox"></div>

<button onclick="printBill()">🧾 Print Bill</button>
<button onclick="checkout()">Checkout</button>
</div>

</div>

<script>

/* NAV */
function showSection(s){
    document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
    document.getElementById(s).classList.add('active');
}

/* STORAGE */
function saveData(){
    localStorage.setItem("suppliers",JSON.stringify(suppliers));
    localStorage.setItem("products",JSON.stringify(products));
    localStorage.setItem("cart",JSON.stringify(cart));
}

function loadData(){
    suppliers=JSON.parse(localStorage.getItem("suppliers"))||[];
    products=JSON.parse(localStorage.getItem("products"))||[];
    cart=JSON.parse(localStorage.getItem("cart"))||[];

    renderSuppliers();
    renderProducts();
    loadDropdown();
    renderCart();
}

/* SUPPLIERS */
let suppliers=[];

function addSupplier(){
    let n=document.getElementById("supplierInput").value;
    if(!n)return;

    suppliers.push(n);
    document.getElementById("supplierInput").value="";
    saveData();
    renderSuppliers();
}

function renderSuppliers(){
    let d=document.getElementById("supplierList");

    d.innerHTML=suppliers.map((s,i)=>
        `<div class="card">${s}
        <button onclick="deleteSupplier(${i})">❌</button></div>`
    ).join('');
}

function deleteSupplier(i){
    suppliers.splice(i,1);
    saveData();
    renderSuppliers();
}

/* PRODUCTS */
let products=[];

function addProduct(){
    let n=document.getElementById("productName").value;
    let p=document.getElementById("productPrice").value;
    if(!n||!p)return;

    products.push({name:n,price:parseFloat(p)});
    document.getElementById("productName").value="";
    document.getElementById("productPrice").value="";

    saveData();
    renderProducts();
    loadDropdown();
}

function renderProducts(){
    let d=document.getElementById("productList");

    d.innerHTML=products.map((p,i)=>
        `<div class="card">${p.name}-₹${p.price}
        <button onclick="deleteProduct(${i})">❌</button></div>`
    ).join('');

    document.getElementById("productCount").innerText=
        "Total Products: "+products.length;
}

function deleteProduct(i){
    products.splice(i,1);
    saveData();
    renderProducts();
    loadDropdown();
}

/* BILLING */
let cart=[];

function loadDropdown(){
    let sel=document.getElementById("productSelect");
    sel.innerHTML=products.map((p,i)=>
        `<option value="${i}">${p.name}</option>`
    ).join('');
}

function addToCart(){
    let index=document.getElementById("productSelect").value;
    let qty=document.getElementById("quantity").value;
    if(!qty)return;

    let p=products[index];

    cart.push({
        name:p.name,
        price:p.price,
        qty:parseInt(qty)
    });

    document.getElementById("quantity").value="";
    saveData();
    renderCart();
}

function renderCart(){
    let d=document.getElementById("cartList");

    d.innerHTML=cart.map((c,i)=>
        `<div class="card">${c.name} x ${c.qty} = ₹${c.price*c.qty}
        <button onclick="removeCart(${i})">❌</button></div>`
    ).join('');

    let total=0;
    let date=new Date().toLocaleString();

    let billHTML=`<h2>My Store</h2>
    <p>${date}</p>
    <h3>🧾 BILL</h3>`;

    cart.forEach(c=>{
        let t=c.price*c.qty;
        total+=t;
        billHTML+=`${c.name} x ${c.qty} = ₹${t}<br>`;
    });

    billHTML+="<hr>";
    billHTML+=`<h2 class="total">Total: ₹${total}</h2>`;

    document.getElementById("billBox").innerHTML=billHTML;
}

function removeCart(i){
    cart.splice(i,1);
    saveData();
    renderCart();
}

function checkout(){
    alert("Bill Generated Successfully!");
    cart=[];
    saveData();
    renderCart();
}

/* PRINT */
function printBill(){
    let content=document.getElementById("billBox").innerHTML;
    let win=window.open('', '', 'width=600,height=600');
    win.document.write(content);
    win.print();
}

/* INIT */
loadData();

</script>

</body>
</html>
